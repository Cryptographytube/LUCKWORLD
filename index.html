*{margin:0;padding:0;box-sizing:border-box}

// ================================================================

const ec = new elliptic.ec('secp256k1');

function hexToBytes(hex){if(hex.length%2)hex='0'+hex;const b=new Uint8Array(hex.length/2);for(let i=0;i<hex.length;i+=2)b[i/2]=parseInt(hex.substr(i,2),16);return b}
function bytesToHex(bytes){return Array.from(bytes,b=>('0'+b.toString(16)).slice(-2)).join('')}
function wordArrayToUint8(wa){const w=wa.words,s=wa.sigBytes,u=new Uint8Array(s);for(let i=0;i<s;i++)u[i]=(w[i>>>2]>>>(24-(i%4)*8))&0xff;return u}
function uint8ToWordArray(u8){const w=[];for(let i=0;i<u8.length;i+=4)w.push(((u8[i]||0)<<24)|((u8[i+1]||0)<<16)|((u8[i+2]||0)<<8)|(u8[i+3]||0));return CryptoJS.lib.WordArray.create(w,u8.length)}

const BASE58_CHARS='123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';
function base58Encode(bytes){const u8=(bytes instanceof Uint8Array)?bytes:new Uint8Array(bytes);let num=0n;for(let i=0;i<u8.length;i++)num=num*256n+BigInt(u8[i]);let str='';while(num>0n){str=BASE58_CHARS[Number(num%58n)]+str;num=num/58n}for(let i=0;i<u8.length&&u8[i]===0;i++)str='1'+str;return str}
function base58CheckEncode(vb,payload){const pu8=(payload instanceof Uint8Array)?payload:hexToBytes(payload);const vu8=(typeof vb==='number')?new Uint8Array([vb]):hexToBytes(vb);const f=new Uint8Array(1+pu8.length);f[0]=vu8[0];f.set(pu8,1);const h1=CryptoJS.SHA256(uint8ToWordArray(f));const h2=CryptoJS.SHA256(h1);const cs=wordArrayToUint8(h2).slice(0,4);const r=new Uint8Array(f.length+4);r.set(f,0);r.set(cs,f.length);return base58Encode(r)}

function mnemonicToMasterKey(mnemonic){const salt=CryptoJS.enc.Utf8.parse('mnemonic');const key=CryptoJS.PBKDF2(mnemonic,salt,{keySize:512/32,hasher:CryptoJS.algo.SHA512,iterations:2048});const hmac=CryptoJS.HmacSHA512(key,CryptoJS.enc.Utf8.parse('Bitcoin seed'));const mb=wordArrayToUint8(hmac);return bytesToHex(mb.slice(0,32))}

function getPublicKeys(privKeyHex){const key=ec.keyFromPrivate(privKeyHex,'hex');const pub=key.getPublic();const x=pub.getX().toString('hex').padStart(64,'0');const y=pub.getY().toString('hex').padStart(64,'0');const prefix=(parseInt(y.substr(63,1),16)%2===0)?'02':'03';return{compressed:prefix+x,uncompressed:'04'+x+y}}

function deriveWallet(mnemonic,coin){const pk=mnemonicToMasterKey(mnemonic);const{compressed,uncompressed}=getPublicKeys(pk);const af=COIN_ADDR[coin];return{privkey_hex:pk,comp_addr:af(compressed),uncomp_addr:af(uncompressed)}}

function genMnemonic(size){const w=[];for(let i=0;i<size;i++)w.push(BIP39[Math.floor(Math.random()*2048)]);return w.join(' ')}

// Round-robin index per coin
let rpcIndex = {};
for (let c in RPC_ENDPOINTS) rpcIndex[c] = 0;

function getNextRPC(coin) {
    const eps = RPC_ENDPOINTS[coin];
    if (!eps || eps.length === 0) return null;
    const idx = rpcIndex[coin] % eps.length;
    rpcIndex[coin]++;
    return eps[idx];
}

let apiCallCount = 0;

async function checkBalance(coin, address) {
    const eps = RPC_ENDPOINTS[coin];
    if (!eps || eps.length === 0) return { received: 0, sent: 0, balance: 0, error: 'No endpoints' };

    // Try up to 3 different endpoints
    for (let attempt = 0; attempt < 3; attempt++) {
        const ep = getNextRPC(coin);
        try {
            apiCallCount++;
            let result;
            if (coin === 'btc') {
                result = await checkBTCBalance(ep, address);
            } else if (coin === 'eth' || coin === 'bnb') {
                result = await checkEVMBalance(ep, address);
            } else if (coin === 'trx') {
                result = await checkTRXBalance(ep, address);
            } else if (coin === 'ltc' || coin === 'dash') {
                result = await checkUTXOBalance(ep, coin, address);
            }
            if (result && !result.error) return result;
        } catch (err) {
            // Try next endpoint
            continue;
        }
    }
    return { received: 0, sent: 0, balance: 0, error: true };
}

// --- BTC ---
async function checkBTCBalance(ep, address) {
    if (ep.type === 'blockchain_info') {
        const resp = await fetch(ep.url + address);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        const info = data[address];
        if (!info) throw new Error('No data');
        return {
            received: (info.total_received || 0) / 1e8,
            sent: (info.total_sent || 0) / 1e8,
            balance: (info.final_balance || 0) / 1e8
        };
    } else if (ep.type === 'mempool' || ep.type === 'blockstream' || ep.type === 'mempool2' || ep.type === 'blockstream2' || ep.type === 'blockstream3' || ep.type === 'btc1trezor') {
        const resp = await fetch(ep.url + address);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        const cs = data.chain_stats || {};
        const funded = parseInt(cs.funded_txo_sum) || 0;
        const spent = parseInt(cs.spent_txo_sum) || 0;
        return {
            received: funded / 1e8,
            sent: spent / 1e8,
            balance: (funded - spent) / 1e8
        };
    } else if (ep.type === 'blockcypher') {
        const resp = await fetch(ep.url + address + '/balance');
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        return {
            received: (data.total_received || 0) / 1e8,
            sent: (data.total_sent || 0) / 1e8,
            balance: (data.final_balance || 0) / 1e8
        };
    } else if (ep.type === 'chainso') {
        const resp = await fetch(ep.url + address);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        if (data.status !== 'success') throw new Error('chainso error');
        const bal = parseFloat(data.data.confirmed_balance) || 0;
        return { received: 0, sent: 0, balance: bal / 1e8 };
    }
    throw new Error('Unknown BTC endpoint type');
}

// --- ETH / BNB (EVM RPC) ---
async function checkEVMBalance(rpcUrl, address) {
    const resp = await fetch(rpcUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            jsonrpc: '2.0',
            method: 'eth_getBalance',
            params: [address, 'latest'],
            id: 1
        })
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    if (data.error) throw new Error(data.error.message || 'RPC error');
    const wei = parseInt(data.result, 16) || 0;
    return { received: 0, sent: 0, balance: wei / 1e18 };
}

// --- TRX ---
async function checkTRXBalance(ep, address) {
    if (ep.type === 'trongrid') {
        const resp = await fetch(ep.url + address, {
            headers: { 'TRON-PRO-API-KEY': '' }
        });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        if (!data.success || !data.data || data.data.length === 0) {
            return { received: 0, sent: 0, balance: 0 };
        }
        const bal = data.data[0].balance || 0;
        return { received: 0, sent: 0, balance: bal / 1e6 };
    } else if (ep.type === 'tronscan' || ep.type === 'tronscan2') {
        const resp = await fetch(ep.url + address);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        const bal = parseFloat(data.balance) || 0;
        return { received: 0, sent: 0, balance: bal / 1e6 };
    } else if (ep.type === 'trongrid2') {
        const resp = await fetch(ep.url + address);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        if (!data.success || !data.data || data.data.length === 0) {
            return { received: 0, sent: 0, balance: 0 };
        }
        const bal = data.data[0].balance || 0;
        return { received: 0, sent: 0, balance: bal / 1e6 };
    } else if (ep.type === 'tronview') {
        const resp = await fetch(ep.url + address);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        const bal = parseFloat(data.balance) || 0;
        return { received: 0, sent: 0, balance: bal / 1e6 };
    }
    throw new Error('Unknown TRX endpoint type');
}

// --- LTC / DASH (UTXO) ---
async function checkUTXOBalance(ep, coin, address) {
    if (ep.type === 'blockcypher') {
        const resp = await fetch(ep.url + address + '/balance');
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        const dec = COIN_DECIMALS[coin] || 8;
        const div = Math.pow(10, dec);
        return {
            received: (data.total_received || 0) / div,
            sent: (data.total_sent || 0) / div,
            balance: (data.final_balance || 0) / div
        };
    } else if (ep.type === 'chainso' || ep.type === 'chainso2') {
        const resp = await fetch(ep.url + address);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        if (data.status !== 'success') throw new Error('chainso error');
        const dec = COIN_DECIMALS[coin] || 8;
        const div = Math.pow(10, dec);
        const bal = parseFloat(data.data.confirmed_balance) || 0;
        return { received: 0, sent: 0, balance: bal / div };
    } else if (ep.type === 'blockcypher' || ep.type === 'blockcypher2') {
        const resp = await fetch(ep.url + address + '/balance');
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        const dec = COIN_DECIMALS[coin] || 8;
        const div = Math.pow(10, dec);
        return {
            received: (data.total_received || 0) / div,
            sent: (data.total_sent || 0) / div,
            balance: (data.final_balance || 0) / div
        };
    } else if (ep.type === 'litecoinspace' || ep.type === 'litecoinspace2') {
        const resp = await fetch(ep.url + address);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        const cs = data.chain_stats || {};
        const funded = parseInt(cs.funded_txo_sum) || 0;
        const spent = parseInt(cs.spent_txo_sum) || 0;
        return {
            received: funded / 1e8,
            sent: spent / 1e8,
            balance: (funded - spent) / 1e8
        };
    }
    throw new Error('Unknown UTXO endpoint type');
}

// ================================================================
//  MAIN SCANNING ENGINE (NO STOP - RUNS FOREVER)
// ================================================================
async function startScan() {
    if (state.scanning) return;
    state.scanning = true;
    state.startTime = performance.now();
    state.lastSpeedUpdate = performance.now();
    state.lastCheckCount = 0;
    state.prevCoin = state.selectedCoin;

    document.getElementById('btnStart').disabled = true;
    document.getElementById('apiDot').classList.remove('error');

    logScanStart(state.selectedCoin);

    // Main loop - runs FOREVER (no stop)
    while (true) {
        try {
            await scanOne();
        } catch (err) {
            document.getElementById('apiDot').classList.add('error');
            log('<span class="log-red">Loop error: ' + err.message + ' - continuing...</span>');
            await sleep(1000);
            document.getElementById('apiDot').classList.remove('error');
        }
    }
}

function logScanStart(coin) {
    const coinName = COIN_NAMES[coin] || coin.toUpperCase();
    const coinSym = COIN_SYMBOL[coin] || coin.toUpperCase();
    const totalEndpoints = RPC_ENDPOINTS[coin] ? RPC_ENDPOINTS[coin].length : 0;
    log('<span class="log-green">========================================</span>');
    log('<span class="log-green" style="font-weight:900;font-size:12px">SCAN STARTED - ' + coinName + ' (' + coinSym + ')</span>');
    log('<span class="log-green">Loaded ' + totalEndpoints + ' RPC/API endpoints</span>');
    log('<span class="log-green">Checking balance for every generated wallet...</span>');
    log('<span class="log-green">Switch coins anytime - takes effect immediately!</span>');
    log('<span class="log-green">========================================</span>');
    log('');
}

async function scanOne() {
    // Read coin LIVE from state every iteration - instant switch!
    const coin = state.selectedCoin;
    const coinSym = COIN_SYMBOL[coin] || coin.toUpperCase();

    // Detect coin change and log it
    if (coin !== state.prevCoin) {
        const oldName = COIN_NAMES[state.prevCoin] || state.prevCoin.toUpperCase();
        const newName = COIN_NAMES[coin] || coin.toUpperCase();
        log('<span class="log-cyan" style="font-weight:900">*** SWITCHED: ' + oldName + ' -> ' + newName + ' ***</span>');
        state.prevCoin = coin;
    }

    const mnemonic = genMnemonic(12);
    const w = deriveWallet(mnemonic, coin);
    state.checkCount++;

    // Log wallet data to console
    logWallet(mnemonic, w.privkey_hex, w.comp_addr, w.uncomp_addr);

    // Check balance via API
    let balResult;
    try {
        balResult = await checkBalance(coin, w.comp_addr);
    } catch (err) {
        balResult = { received: 0, sent: 0, balance: 0, error: true };
    }

    // Display balance
    if (balResult.error) {
        logBalanceError();
        document.getElementById('apiDot').classList.add('error');
        setTimeout(function(){ document.getElementById('apiDot').classList.remove('error'); }, 2000);
    } else {
        logBalance(balResult, coinSym);

        // Check for FOUND (any of received/sent/balance > 0)
        if ((balResult.received || 0) > 0 || (balResult.sent || 0) > 0 || (balResult.balance || 0) > 0) {
            handleFound(mnemonic, w, balResult, state.selectedCoin);
        }
    }

    // Update live preview
    updateLivePreview(mnemonic, w, balResult, coinSym);

    // Update stats and speed
    updateStats();
    const now = performance.now();
    if (now - state.lastSpeedUpdate >= 1000) {
        const elapsed = (now - state.lastSpeedUpdate) / 1000;
        const diff = state.checkCount - state.lastCheckCount;
        const speed = Math.round(diff / elapsed);
        document.getElementById('speedDisplay').textContent = speed.toLocaleString();
        state.lastSpeedUpdate = now;
        state.lastCheckCount = state.checkCount;
    }
}

function updateLivePreview(mnemonic, w, balResult, coinSym) {
    const fmt = (v) => v.toFixed(8);
    let balStr;
    if (balResult.error) {
        balStr = 'Balance: API ERROR';
    } else if (balResult.received !== undefined) {
        balStr = 'Received: ' + fmt(balResult.received) + ' ' + coinSym +
                 '  |  Sent: ' + fmt(balResult.sent) + ' ' + coinSym +
                 '  |  Balance: ' + fmt(balResult.balance) + ' ' + coinSym;
    } else {
        balStr = 'Balance: ' + fmt(balResult.balance) + ' ' + coinSym;
    }
    document.getElementById('liveText').textContent =
        'MNEMONIC           : ' + mnemonic + '\n' +
        'PRIVATE KEY (HEX)  : ' + w.privkey_hex + '\n' +
        'COMPRESSED ADDR    : ' + w.comp_addr + '\n' +
        'UNCOMPRESSED ADDR  : ' + w.uncomp_addr + '\n' +
        balStr;
}

// ================================================================
//  KEYBOARD SHORTCUTS
// ================================================================
document.addEventListener('keydown', function(e) {
    // Coin switching works even while scanning - instant switch!
    if (e.ctrlKey && e.key.toLowerCase()==='b' && !e.shiftKey) { e.preventDefault(); selectCoin('btc'); }
    else if (e.ctrlKey && e.key.toLowerCase()==='e') { e.preventDefault(); selectCoin('eth'); }
    else if (e.ctrlKey && e.key.toLowerCase()==='t') { e.preventDefault(); selectCoin('trx'); }
    else if (e.ctrlKey && e.key.toLowerCase()==='l') { e.preventDefault(); selectCoin('ltc'); }
    else if (e.ctrlKey && e.shiftKey && e.key.toLowerCase()==='b') { e.preventDefault(); selectCoin('bnb'); }
    else if (e.ctrlKey && e.key.toLowerCase()==='d') { e.preventDefault(); selectCoin('dash'); }
});

// ================================================================
//  INIT
// ================================================================
(function checkLibs() {
    var missing = [];
    if (typeof CryptoJS === 'undefined') missing.push('CryptoJS');
    if (typeof elliptic === 'undefined') missing.push('elliptic');
    if (typeof keccak_256 === 'undefined') missing.push('js-sha3/keccak256');
    if (missing.length > 0) {
        log('<span class="log-red">ERROR: Failed to load: ' + missing.join(', ') + '</span>');
        log('<span class="log-red">Check internet connection and refresh.</span>');
        return;
    }
    log('<span class="log-blue" style="font-weight:900;font-size:12px">LUCK WORLD - Blockchain Balance Scanner</span>');
    log('<span class="log-green">All crypto libraries loaded successfully.</span>');

    var totalRPC = 0;
    for (var c in RPC_ENDPOINTS) totalRPC += RPC_ENDPOINTS[c].length;
    log('<span class="log-cyan">Loaded ' + totalRPC + ' free RPC/API endpoints across 6 coins.</span>');
    log('<span class="log-cyan">BTC: ' + RPC_ENDPOINTS.btc.length + ' | ETH: ' + RPC_ENDPOINTS.eth.length +
        ' | BNB: ' + RPC_ENDPOINTS.bnb.length + ' | TRX: ' + RPC_ENDPOINTS.trx.length +
        ' | LTC: ' + RPC_ENDPOINTS.ltc.length + ' | DASH: ' + RPC_ENDPOINTS.dash.length + '</span>');
    log('');
    log('Coin Selected : <span class="log-blue">Bitcoin (BTC)</span>');
    log('<span class="log-green">Press START to begin scanning. Runs forever - no stop.</span>');
    log('<span class="log-dim">Keyboard: Ctrl+B (BTC) | Ctrl+E (ETH) | Ctrl+T (TRX) | Ctrl+L (LTC) | Ctrl+Shift+B (BNB) | Ctrl+D (DASH)</span>');
})();
